name: Release

# Triggers:
#   - Push a tag like v1.1.2 → build Windows + Linux installers, attach to the
#     release that GitHub auto-creates for the tag.
#   - workflow_dispatch → manual run from the Actions tab (handy for testing).
#
# macOS DMG is intentionally NOT built here — the existing local flow on the
# maintainer's Mac handles it. Adding macOS to CI is straightforward later.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create/update releases and upload assets

jobs:

  # --------------------------------------------------------------------
  # Run the state-sync test suite before building. Catches regressions
  # before they ship to users.
  # --------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt platform deps (offscreen needs libxcb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-build.txt
          pip install pytest pytest-qt

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -q

  # --------------------------------------------------------------------
  # Windows: PyInstaller → NSIS installer (.exe)
  # --------------------------------------------------------------------
  build-windows:
    name: Build Windows installer
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build (PyInstaller + NSIS)
        # build.py runs PyInstaller, then invokes makensis if it's on PATH.
        # The chocolatey-installed makensis is in C:\Program Files (x86)\NSIS.
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          python build.py

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: ImageViewer_Setup-windows
          path: dist/ImageViewer_Setup.exe
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageViewer_Setup.exe
          fail_on_unmatched_files: true

  # --------------------------------------------------------------------
  # Linux: PyInstaller → .deb (via build.sh)
  # --------------------------------------------------------------------
  build-linux:
    name: Build Linux .deb
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt runtime deps for the bundle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 \
            dpkg-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build (PyInstaller + dpkg)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: ImageViewer_Linux-deb
          path: dist/ImageViewer_Linux.deb
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageViewer_Linux.deb
          fail_on_unmatched_files: true
