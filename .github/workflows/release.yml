name: Release

# Triggers:
#   - Push a tag like v1.1.2 → build Windows + Linux installers, attach to the
#     release that GitHub auto-creates for the tag.
#   - workflow_dispatch → manual run from the Actions tab (handy for testing).
#
# All three platforms (Windows, Linux, macOS) are built in CI. The macOS
# runner is Apple Silicon (arm64), matching the maintainer's local Mac —
# Intel Mac users have not been supported by the local build either.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create/update releases and upload assets

jobs:

  # --------------------------------------------------------------------
  # Run the state-sync test suite before building. Catches regressions
  # before they ship to users.
  # --------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Time estimate
        run: |
          echo "::notice title=Test job ETA::~30 s on warm cache, ~1 min on cold cache (measured 52 s on first ever run)."

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt platform deps (offscreen needs libxcb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-build.txt
          pip install pytest pytest-qt

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -q

  # --------------------------------------------------------------------
  # Windows: PyInstaller → NSIS installer (.exe)
  # --------------------------------------------------------------------
  build-windows:
    name: Build Windows installer
    needs: test
    runs-on: windows-latest
    steps:
      - name: Time estimate
        shell: bash
        run: |
          echo "::notice title=Windows build ETA::~3-4 min on cold cache (measured 3m 44s on first ever run), ~2-3 min on warm cache. PyInstaller and NSIS install dominate."

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build (PyInstaller + NSIS)
        # build.py runs PyInstaller, then invokes makensis if it's on PATH.
        # The chocolatey-installed makensis is in C:\Program Files (x86)\NSIS.
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          python build.py

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: ImageViewer_Setup-windows
          path: dist/ImageViewer_Setup.exe
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageViewer_Setup.exe
          fail_on_unmatched_files: true

  # --------------------------------------------------------------------
  # Linux: PyInstaller → .deb (via build.sh)
  # --------------------------------------------------------------------
  build-linux:
    name: Build Linux .deb
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Time estimate
        run: |
          echo "::notice title=Linux build ETA::~2-3 min on cold cache (measured 2m 40s on first ever run), ~1-2 min on warm cache."

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt runtime deps for the bundle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 \
            dpkg-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build (PyInstaller + dpkg)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: ImageViewer_Linux-deb
          path: dist/ImageViewer_Linux.deb
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageViewer_Linux.deb
          fail_on_unmatched_files: true

  # --------------------------------------------------------------------
  # macOS: PyInstaller → DMG (via build.sh, which delegates to build.py
  # which calls hdiutil). Apple Silicon arm64 only.
  # --------------------------------------------------------------------
  build-macos:
    name: Build macOS DMG
    needs: test
    runs-on: macos-latest
    steps:
      - name: Time estimate
        run: |
          echo "::notice title=macOS build ETA::~1-2 min on cold cache (measured 1m 28s on first run), ~1 min on warm cache. Apple Silicon arm64 only."

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build (PyInstaller + DMG via hdiutil)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: ImageViewer_Installer-macos
          path: dist/ImageViewer_Installer.dmg
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageViewer_Installer.dmg
          fail_on_unmatched_files: true
